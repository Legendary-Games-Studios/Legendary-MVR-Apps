<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MVRCoasters – True WebXR 3D VR</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/webxr/VRButton.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/OrbitControls.js"></script>

<script>
// --- Scene & Renderer ---
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,0,500);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(THREE.VRButton.createButton(renderer));

window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Gaze Menu ---
let menuActive = true;
let gazeTimer = 0;
const gazeTime = 2000;
const buttonPos = new THREE.Vector3(0,1,-3);

const menuGeom = new THREE.PlaneGeometry(2,0.5);
const menuMat = new THREE.MeshBasicMaterial({color:0x00ff00});
const menuButton = new THREE.Mesh(menuGeom, menuMat);
menuButton.position.copy(buttonPos);
scene.add(menuButton);

// --- Track ---
const trackPoints = [];
const trackLoops = 2;
const pointsPerLoop = 120;
for(let l=0;l<trackLoops;l++){
    for(let i=0;i<pointsPerLoop;i++){
        const t = i / pointsPerLoop * Math.PI*2;
        const height = Math.sin(t*2 + l) * 3;
        const x = Math.cos(t + l)*5;
        const y = height + 1;
        const z = -i*4 - l*pointsPerLoop*4;
        trackPoints.push(new THREE.Vector3(x,y,z));
    }
}
trackPoints.push(trackPoints[0].clone());

const trackCurve = new THREE.CatmullRomCurve3(trackPoints,true);
const tubeGeom = new THREE.TubeGeometry(trackCurve, trackPoints.length*2, 0.3, 8, true);
const tubeMat = new THREE.MeshBasicMaterial({color:0xff00ff});
scene.add(new THREE.Mesh(tubeGeom,tubeMat));

// --- Alien Scenery ---
function addAlienObject(x,y,z,size,color){
    const geom = new THREE.SphereGeometry(size,16,16);
    const mat = new THREE.MeshBasicMaterial({color:color});
    const mesh = new THREE.Mesh(geom,mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
}
for(let i=0;i<trackPoints.length;i+=5){
    const p = trackPoints[i];
    addAlienObject(p.x+Math.random()*8-4, p.y+Math.random()*6-3, p.z+Math.random()*8-4, 0.5+Math.random()*0.5, Math.random()*0xffffff);
}

// --- Ride ---
let trackIndex = 0;
const rideSpeed = 0.5;

// --- Animate ---
function animate(){
    renderer.setAnimationLoop(render);
}

function render(timestamp, frame){
    if(menuActive){
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        const toButton = buttonPos.clone().sub(camera.position).normalize();
        const dot = camDir.dot(toButton);
        if(dot>0.95){
            gazeTimer += renderer.xr.isPresenting ? 16 : 16;
            menuButton.material.color.setHex(0xffff00);
            if(gazeTimer>gazeTime){
                menuActive=false;
                scene.remove(menuButton);
            }
        } else {
            gazeTimer=0;
            menuButton.material.color.setHex(0x00ff00);
        }
    } else {
        trackIndex += rideSpeed/5;
        if(trackIndex >= trackPoints.length-1) trackIndex = 0;
        const curr = trackCurve.getPoint(trackIndex/(trackPoints.length-1));
        const next = trackCurve.getPoint((trackIndex+1)/(trackPoints.length-1));
        camera.position.copy(curr);
        camera.lookAt(next);
    }
    renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
