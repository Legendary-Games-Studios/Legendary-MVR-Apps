<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MVRCoasters – Flying Saucer</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
#permissionBtn {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  padding:20px 40px; font-size:18px; background:#00ff00; color:#000;
  border:none; border-radius:8px; z-index:10; cursor:pointer;
}
</style>
</head>
<body>
<button id="permissionBtn">Enable VR Sensors</button>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script>
// --- Scene Setup ---
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,0,500);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.5,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

// --- Stereo Setup ---
const eyeSeparation = 0.03;

// --- Gaze Menu ---
let menuActive = true;
let gazeTimer = 0;
const gazeTime = 2000;
const buttonPos = new THREE.Vector3(0,1.5,-3);

const menuGeom = new THREE.PlaneGeometry(2,0.5);
const menuMat = new THREE.MeshBasicMaterial({color:0x00ff00});
const menuButton = new THREE.Mesh(menuGeom, menuMat);
menuButton.position.copy(buttonPos);
scene.add(menuButton);

// --- Coaster Track ---
const trackPoints = [];
const loops = 2;
const pointsPerLoop = 200;
for(let l=0;l<loops;l++){
    for(let i=0;i<pointsPerLoop;i++){
        const t = i/pointsPerLoop * Math.PI*2;
        const radius = 5 + Math.sin(t*3+l)*2;
        const height = Math.sin(t*4+l)*3 + 1.5;
        const x = Math.cos(t+l)*radius;
        const y = height;
        const z = Math.sin(t+l)*radius*1.5 - l*pointsPerLoop*2;
        trackPoints.push(new THREE.Vector3(x,y,z));
    }
}
trackPoints.push(trackPoints[0].clone());

const trackCurve = new THREE.CatmullRomCurve3(trackPoints,true);
const tubeGeom = new THREE.TubeGeometry(trackCurve, trackPoints.length*2, 0.3, 8, true);
const tubeMat = new THREE.MeshBasicMaterial({color:0xff00ff});
scene.add(new THREE.Mesh(tubeGeom,tubeMat));

// --- Alien Scenery ---
function addAlienObject(x,y,z,size,color){
    const geom = new THREE.SphereGeometry(size,16,16);
    const mat = new THREE.MeshBasicMaterial({color:color});
    const mesh = new THREE.Mesh(geom,mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
}
for(let i=0;i<trackPoints.length;i+=5){
    const p = trackPoints[i];
    addAlienObject(p.x+Math.random()*8-4, p.y+Math.random()*6-3, p.z+Math.random()*8-4, 0.5+Math.random()*0.5, Math.random()*0xffffff);
}

// --- Ride Variables ---
let trackIndex = 0;
const rideSpeed = 0.5;

// --- DeviceOrientation ---
let orientationEnabled = false;
const deviceQuat = new THREE.Quaternion();
const euler = new THREE.Euler();
function enableOrientation(){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
        DeviceOrientationEvent.requestPermission().then(res=>{
            if(res==='granted'){
                window.addEventListener('deviceorientation', e=>{
                    const alpha = THREE.MathUtils.degToRad(e.alpha||0);
                    const beta = THREE.MathUtils.degToRad(e.beta||0);
                    const gamma = THREE.MathUtils.degToRad(e.gamma||0);
                    euler.set(beta, alpha, -gamma, 'YXZ');
                    deviceQuat.setFromEuler(euler);
                });
                orientationEnabled=true;
                document.getElementById('permissionBtn').style.display='none';
            }
        }).catch(console.error);
    } else {
        window.addEventListener('deviceorientation', e=>{
            const alpha = THREE.MathUtils.degToRad(e.alpha||0);
            const beta = THREE.MathUtils.degToRad(e.beta||0);
            const gamma = THREE.MathUtils.degToRad(e.gamma||0);
            euler.set(beta, alpha, -gamma, 'YXZ');
            deviceQuat.setFromEuler(euler);
        });
        orientationEnabled=true;
        document.getElementById('permissionBtn').style.display='none';
    }
}
document.getElementById('permissionBtn').addEventListener('click', enableOrientation);

// --- Animate ---
function animate(){
    requestAnimationFrame(animate);
    render();
}

function render(){
    if(!orientationEnabled) return;

    if(menuActive){
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        const toButton = buttonPos.clone().sub(camera.position).normalize();
        const dot = camDir.dot(toButton);
        if(dot>0.95){
            gazeTimer += 16;
            menuButton.material.color.setHex(0xffff00);
            if(gazeTimer>gazeTime){
                menuActive=false;
                scene.remove(menuButton);
            }
        } else {
            gazeTimer=0;
            menuButton.material.color.setHex(0x00ff00);
        }
    } else {
        // --- Move along track ---
        trackIndex += rideSpeed/5;
        if(trackIndex>=trackPoints.length-1) trackIndex=0;
        const curr = trackCurve.getPoint(trackIndex/(trackPoints.length-1));
        const next = trackCurve.getPoint((trackIndex+1)/(trackPoints.length-1));
        camera.position.copy(curr);

        const lookDir = new THREE.Vector3().subVectors(next,curr).normalize();
        const lookTarget = curr.clone().add(lookDir);

        // --- Cart orientation ---
        const cartQuat = new THREE.Quaternion();
        camera.lookAt(lookTarget);
        cartQuat.copy(camera.quaternion);

        // --- Apply head rotation on top ---
        camera.quaternion.copy(cartQuat).multiply(deviceQuat);
    }

    // --- Stereo rendering ---
    renderer.clear();
    renderer.setScissorTest(true);

    // Left eye
    renderer.setScissor(0,0,window.innerWidth/2,window.innerHeight);
    renderer.setViewport(0,0,window.innerWidth/2,window.innerHeight);
    camera.position.x -= eyeSeparation;
    renderer.render(scene,camera);

    // Right eye
    camera.position.x += eyeSeparation*2;
    renderer.setScissor(window.innerWidth/2,0,window.innerWidth/2,window.innerHeight);
    renderer.setViewport(window.innerWidth/2,0,window.innerWidth/2,window.innerHeight);
    renderer.render(scene,camera);

    camera.position.x -= eyeSeparation; // reset
    renderer.setScissorTest(false);
}

animate();
</script>
</body>
</html>
